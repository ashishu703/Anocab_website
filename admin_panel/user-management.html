<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management - Anocab Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 40px auto;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .main-card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .action-bar {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      align-items: center;
    }

    .action-bar button {
      flex: 1;
      padding: 14px 20px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-create {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-create:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-download-bulk {
      background: #28a745;
      color: white;
    }

    .btn-download-bulk:hover {
      background: #218838;
      transform: translateY(-2px);
    }

    .btn-delete-bulk {
      background: #dc3545;
      color: white;
    }

    .btn-delete-bulk:hover {
      background: #c82333;
      transform: translateY(-2px);
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.3s ease;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 28px;
      color: #999;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      color: #333;
      transform: rotate(90deg);
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
      font-size: 14px;
      transition: all 0.3s ease;
      background: white;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .file-upload-wrapper {
      position: relative;
    }

    .file-upload-label {
      display: block;
      padding: 12px 14px;
      background: white;
      border: 2px dashed #e0e0e0;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .file-upload-label:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    input[type="file"] {
      display: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .users-list-section {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 12px;
    }

    .users-table {
      width: 100%;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .users-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .users-table th {
      background: #667eea;
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
    }

    .users-table td {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
    }

    .users-table tr:hover {
      background: #f8f9fa;
    }

    .user-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .qr-preview {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-download {
      background: #17a2b8;
      color: white;
    }

    .btn-download:hover {
      background: #138496;
    }

    .btn-delete {
      background: #dc3545;
      color: white;
    }

    .btn-delete:hover {
      background: #c82333;
    }

    .success-msg {
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 14px;
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
      display: none;
    }

    .success-msg.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .users-table {
        overflow-x: auto;
      }

      .action-bar {
        flex-direction: column;
      }

      .action-bar button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="location.href='/login_panel/dashboard.html'">← Back to Dashboard</button>
    
    <div class="main-card">
      <h1>👥 User Management</h1>
      <p class="subtitle">Create and manage users for catalogue generation</p>

      <!-- Action Bar -->
      <div class="action-bar">
        <button class="btn-create" onclick="openCreateModal()">➕ Create New User</button>
        <button class="btn-download-bulk" id="bulkDownloadBtn">📥 Download Selected</button>
        <button class="btn-delete-bulk" id="bulkDeleteBtn">🗑️ Delete Selected</button>
      </div>

      <!-- Users List Section -->
      <div class="users-list-section">

        <div class="users-table" id="usersTableContainer">
          <table>
            <thead>
              <tr>
                <th width="50"><input type="checkbox" id="selectAllHeader" class="user-checkbox"></th>
                <th>Name</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>QR Code</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="6" class="empty-state">No users created yet</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden canvas for generating catalogues -->
  <canvas id="hiddenCanvas" width="800" height="1200" style="display: none;"></canvas>

  <!-- Create User Modal -->
  <div id="createUserModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">➕ Create New User</h2>
        <button class="close-btn" onclick="closeCreateModal()">&times;</button>
      </div>
      
      <form id="createUserForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Name *</label>
            <input type="text" id="userName" placeholder="Enter full name" required>
          </div>

          <div class="form-group">
            <label>Mobile Number *</label>
            <input type="text" id="userMobile" placeholder="Enter mobile number" required>
          </div>

          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="userEmail" placeholder="Enter email address" required>
          </div>

          <div class="form-group">
            <label>QR Code Image (Optional)</label>
            <div class="file-upload-wrapper">
              <label for="userQR" class="file-upload-label">
                <span id="qrFileName">📱 Click to upload QR code</span>
              </label>
              <input type="file" id="userQR" accept="image/*">
            </div>
          </div>
        </div>

        <button type="submit" class="btn-primary">💾 Create User</button>
        <div class="success-msg" id="successMsg"></div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script>
    const API_BASE_URL = window.API_BASE_URL || "https://anocab.com";

    // Load template images from settings
    let templateImages = {
      header: null,
      anocabLogo: null,
      jeoLogo: null,
      footerLogo: null
    };

    // Load template images from database
    async function loadTemplateImages() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/catalogue/settings`);
        const settings = await response.json();
        
        const loadPromises = [];
        
        if (settings.header) {
          loadPromises.push(loadImageFromBase64('header', settings.header));
        }
        if (settings.anocabLogo) {
          loadPromises.push(loadImageFromBase64('anocabLogo', settings.anocabLogo));
        }
        if (settings.jeoLogo) {
          loadPromises.push(loadImageFromBase64('jeoLogo', settings.jeoLogo));
        }
        if (settings.footerLogo) {
          loadPromises.push(loadImageFromBase64('footerLogo', settings.footerLogo));
        }
        
        await Promise.all(loadPromises);
      } catch (error) {
        console.error('Error loading template images:', error);
      }
    }

    function loadImageFromBase64(key, base64) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          templateImages[key] = img;
          resolve();
        };
        img.onerror = () => {
          console.error(`Failed to load ${key}`);
          resolve();
        };
        img.src = base64;
      });
    }

    function loadImageFromUrl(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    // Generate catalogue for a user
    async function generateCatalogueForUser(user) {
      const canvas = document.getElementById('hiddenCanvas');
      const ctx = canvas.getContext('2d');

      // Clear canvas
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      let yPos = 0;

      // Draw header image
      if (templateImages.header) {
        const headerHeight = 350;
        ctx.drawImage(templateImages.header, 0, yPos, canvas.width, headerHeight);
        yPos += headerHeight + 26;
      }

      // Draw logos
      if (templateImages.anocabLogo || templateImages.jeoLogo) {
        const logoY = yPos;
        const logoHeight = 120;
        
        if (templateImages.anocabLogo) {
          const aspectRatio = templateImages.anocabLogo.width / templateImages.anocabLogo.height;
          const logoWidth = logoHeight * aspectRatio;
          ctx.drawImage(templateImages.anocabLogo, 60, logoY, logoWidth, logoHeight);
        }
        
        if (templateImages.jeoLogo) {
          const aspectRatio = templateImages.jeoLogo.width / templateImages.jeoLogo.height;
          const logoWidth = logoHeight * aspectRatio;
          ctx.drawImage(templateImages.jeoLogo, canvas.width - logoWidth - 60, logoY, logoWidth, logoHeight);
        }
        
        yPos += logoHeight + 36;
      }

      // Draw price banner
      const bannerWidth = canvas.width / 2;
      const bannerX = (canvas.width - bannerWidth) / 2;
      
      const gradient = ctx.createLinearGradient(bannerX, yPos, bannerX + bannerWidth, yPos);
      gradient.addColorStop(0, '#5a6c7d');
      gradient.addColorStop(0.5, '#4a5c6d');
      gradient.addColorStop(1, '#5a6c7d');
      ctx.fillStyle = gradient;
      
      ctx.beginPath();
      ctx.moveTo(bannerX + 20, yPos);
      ctx.lineTo(bannerX + bannerWidth - 20, yPos);
      ctx.lineTo(bannerX + bannerWidth, yPos + 25);
      ctx.lineTo(bannerX + bannerWidth - 20, yPos + 50);
      ctx.lineTo(bannerX + 20, yPos + 50);
      ctx.lineTo(bannerX, yPos + 25);
      ctx.closePath();
      ctx.fill();
      
      ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
      ctx.shadowBlur = 10;
      ctx.shadowOffsetY = 3;
      
      ctx.fillStyle = 'white';
      ctx.font = 'bold 26px Arial';
      ctx.textAlign = 'center';
      
      const today = new Date();
      const dateStr = `${String(today.getDate()).padStart(2, '0')}/${String(today.getMonth() + 1).padStart(2, '0')}/${today.getFullYear()}`;
      ctx.fillText(`Price update for ${dateStr}`, canvas.width / 2, yPos + 33);
      
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      
      yPos += 100;

      // Fetch and draw prices
      try {
        const response = await fetch(`${API_BASE_URL}/api/prices`);
        const prices = await response.json();

        const historyResponse = await fetch(`${API_BASE_URL}/api/price-history`);
        const priceHistory = await historyResponse.json();
        
        const yesterdayPrices = priceHistory.length > 0 ? priceHistory[priceHistory.length - 1].prices : {};

        ctx.textAlign = 'left';

        const priceData = [
          { key: 'aluminum_ec', name: 'Aluminum EC ( Balco )', price: prices.aluminum_ec, prevPrice: yesterdayPrices.aluminum_ec },
          { key: 'aluminum_alloy', name: 'Aluminum Alloy ( Balco )', price: prices.aluminum_alloy, prevPrice: yesterdayPrices.aluminum_alloy },
          { key: 'copper', name: 'Copper ( Mcx )', price: prices.copper, prevPrice: yesterdayPrices.copper },
          { key: 'pvc', name: 'PVC - G7GER0IF ( Reliance )', price: prices.pvc || '----', prevPrice: yesterdayPrices.pvc },
          { key: 'lldpe', name: 'LLDPE - X24065 ( Reliance )', price: prices.lldpe, prevPrice: yesterdayPrices.lldpe }
        ];

        priceData.forEach((item, index) => {
          const itemY = yPos + (index * 41);
          
          ctx.fillStyle = '#1a1a1a';
          ctx.font = 'bold 24px Arial';
          ctx.fillText(item.name, 60, itemY);
          
          ctx.fillStyle = '#000';
          ctx.font = 'bold 24px Arial';
          const priceStr = typeof item.price === 'number' ? item.price.toFixed(2) : item.price;
          ctx.fillText(`₹`, 480, itemY);
          ctx.fillText(`${priceStr}`, 510, itemY);
          
          if (item.prevPrice && item.price !== '----' && typeof item.price === 'number') {
            const change = item.price - item.prevPrice;
            const changeStr = change >= 0 ? `+${change.toFixed(2)}` : change.toFixed(2);
            
            ctx.font = '18px Arial';
            ctx.fillStyle = '#666';
            ctx.fillText(`(${changeStr})`, 610, itemY);
          }
          
          let trend = '↑';
          let trendColor = '#dc3545';
          
          if (item.prevPrice && item.price !== '----' && typeof item.price === 'number') {
            if (item.price < item.prevPrice) {
              trend = '↓';
              trendColor = '#28a745';
            }
          }
          
          ctx.fillStyle = trendColor;
          ctx.font = 'bold 38px Arial';
          ctx.fillText(trend, 720, itemY);
        });

        yPos += 227;
      } catch (error) {
        console.error('Error fetching prices:', error);
        yPos += 227;
      }

      // Draw line
      ctx.strokeStyle = '#a0a0a0';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(40, yPos);
      ctx.lineTo(canvas.width - 40, yPos);
      ctx.stroke();
      
      yPos += 41;

      // Draw contact info
      if (user.name) {
        ctx.textAlign = 'left';
        
        ctx.fillStyle = '#0066cc';
        ctx.font = 'bold 30px Arial';
        ctx.fillText(user.name, 60, yPos);
        
        ctx.font = 'bold 26px Arial';
        ctx.fillText(user.mobile, 60, yPos + 45);
        ctx.fillText(user.email, 60, yPos + 85);

        if (user.qrCode) {
          const qrImg = await loadImageFromUrl(user.qrCode);
          if (qrImg) {
            const qrSize = 130;
            ctx.drawImage(qrImg, canvas.width - qrSize - 60, yPos - 10, qrSize, qrSize);
          }
        }

        yPos += 118;
      }

      // Draw footer logo
      if (templateImages.footerLogo) {
        const footerLogoHeight = 90;
        const footerLogoWidth = (templateImages.footerLogo.width / templateImages.footerLogo.height) * footerLogoHeight;
        const logoX = (canvas.width - footerLogoWidth) / 2;
        ctx.drawImage(templateImages.footerLogo, logoX, yPos, footerLogoWidth, footerLogoHeight);
        yPos += footerLogoHeight + 17;
      }

      // Draw footer text
      ctx.fillStyle = '#0066cc';
      ctx.font = 'bold 26px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Manufacturers of Complete Range of  Wire & Cable', canvas.width / 2, yPos);
      
      yPos += 36;
      
      ctx.fillStyle = '#000';
      ctx.font = 'bold 20px Arial';
      ctx.fillText('Anode Electric Pvt. Ltd. ® | Samriddhi Industries ® www.anocab.com', canvas.width / 2, yPos);
      
      yPos += 31;
      
      ctx.font = 'bold 20px Arial';
      ctx.fillText('sales@anocab.in | sales@jeo.co.in | 1800-27-000-75', canvas.width / 2, yPos);
      
      return canvas;
    }

    // Format filename
    function formatFilename(userName) {
      const today = new Date();
      const day = String(today.getDate()).padStart(2, '0');
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const month = months[today.getMonth()];
      
      // Remove spaces and special characters from name
      const cleanName = userName.toLowerCase().replace(/\s+/g, '');
      
      return `${cleanName}_${day}${month}.png`;
    }

    // Modal functions
    function openCreateModal() {
      document.getElementById('createUserModal').classList.add('show');
    }

    function closeCreateModal() {
      document.getElementById('createUserModal').classList.remove('show');
    }

    // Close modal on outside click
    window.onclick = function(event) {
      const modal = document.getElementById('createUserModal');
      if (event.target === modal) {
        closeCreateModal();
      }
    }

    // Get all users from database
    async function getAllUsers() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/catalogue/users`);
        return await response.json();
      } catch (error) {
        console.error('Error fetching users:', error);
        return [];
      }
    }

    // Save user to database
    async function saveUser(userData) {
      try {
        const response = await fetch(`${API_BASE_URL}/api/catalogue/users`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(userData)
        });
        const result = await response.json();
        if (result.status === 'success') {
          return result.user;
        } else {
          throw new Error(result.error || 'Failed to save user');
        }
      } catch (error) {
        console.error('Error saving user:', error);
        throw error;
      }
    }

    // Delete user from database
    async function deleteUser(id) {
      try {
        const token = localStorage.getItem('authToken');
        const response = await fetch(`${API_BASE_URL}/api/catalogue/users/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        const result = await response.json();
        if (result.status !== 'success') {
          throw new Error(result.error || 'Failed to delete user');
        }
      } catch (error) {
        console.error('Error deleting user:', error);
        throw error;
      }
    }

    // Handle QR upload
    let qrCodeData = null;
    document.getElementById('userQR').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          qrCodeData = e.target.result;
          document.getElementById('qrFileName').textContent = `✓ ${file.name}`;
        };
        reader.readAsDataURL(file);
      }
    });

    // Create user form submit
    document.getElementById('createUserForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const userData = {
        name: document.getElementById('userName').value.trim(),
        mobile: document.getElementById('userMobile').value.trim(),
        email: document.getElementById('userEmail').value.trim(),
        qrCode: qrCodeData
      };

      try {
        await saveUser(userData);
        
        // Clear form
        this.reset();
        qrCodeData = null;
        document.getElementById('qrFileName').textContent = '📱 Click to upload QR code';
        
        // Show success message
        const successMsg = document.getElementById('successMsg');
        successMsg.textContent = '✓ User created successfully!';
        successMsg.classList.add('show');
        setTimeout(() => {
          successMsg.classList.remove('show');
          closeCreateModal();
        }, 1500);
        
        // Refresh table
        await renderUsersTable();
      } catch (error) {
        alert('Error creating user: ' + error.message);
      }
    });

    // Render users table
    async function renderUsersTable() {
      const users = await getAllUsers();
      const tbody = document.getElementById('usersTableBody');

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No users created yet</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => `
        <tr>
          <td><input type="checkbox" class="user-checkbox" data-id="${user._id}"></td>
          <td><strong>${user.name}</strong></td>
          <td>${user.mobile}</td>
          <td>${user.email}</td>
          <td>${user.qrCode ? `<img src="${user.qrCode}" class="qr-preview" alt="QR" onclick="window.open('${user.qrCode}', '_blank')">` : '-'}</td>
          <td>
            <div class="action-buttons">
              <button class="btn-small btn-download" onclick="downloadSingle('${user._id}')">⬇️ Download</button>
              <button class="btn-small btn-delete" onclick="deleteSingleUser('${user._id}')">🗑️ Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Select all functionality
    document.getElementById('selectAllHeader').addEventListener('change', function() {
      const checkboxes = document.querySelectorAll('.user-checkbox[data-id]');
      checkboxes.forEach(cb => cb.checked = this.checked);
    });

    // Download single user
    window.downloadSingle = async function(userId) {
      const users = await getAllUsers();
      const user = users.find(u => u._id === userId);
      if (!user) return;

      // Show loading
      const btn = event.target;
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '⏳ Generating...';

      try {
        await loadTemplateImages();
        const canvas = await generateCatalogueForUser(user);
        
        const link = document.createElement('a');
        link.download = formatFilename(user.name);
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        btn.textContent = '✓ Downloaded!';
        setTimeout(() => {
          btn.textContent = originalText;
          btn.disabled = false;
        }, 2000);
      } catch (error) {
        console.error('Error generating catalogue:', error);
        alert('Error generating catalogue. Please try again.');
        btn.textContent = originalText;
        btn.disabled = false;
      }
    };

    // Delete single user
    window.deleteSingleUser = async function(userId) {
      if (confirm('Are you sure you want to delete this user?')) {
        try {
          await deleteUser(userId);
          await renderUsersTable();
        } catch (error) {
          alert('Error deleting user: ' + error.message);
        }
      }
    };

    // Bulk delete
    document.getElementById('bulkDeleteBtn').addEventListener('click', async function() {
      const selected = document.querySelectorAll('.user-checkbox[data-id]:checked');
      if (selected.length === 0) {
        alert('Please select at least one user');
        return;
      }

      if (confirm(`Delete ${selected.length} user(s)?`)) {
        try {
          for (const cb of selected) {
            await deleteUser(cb.dataset.id);
          }
          await renderUsersTable();
        } catch (error) {
          alert('Error deleting users: ' + error.message);
        }
      }
    });

    // Bulk download - redirect to catalogue page
    document.getElementById('bulkDownloadBtn').addEventListener('click', async function() {
      const selected = document.querySelectorAll('.user-checkbox[data-id]:checked');
      if (selected.length === 0) {
        alert('Please select at least one user');
        return;
      }

      this.disabled = true;
      this.textContent = '⏳ Generating catalogues...';

      try {
        await loadTemplateImages();
        
        const zip = new JSZip();
        const users = await getAllUsers();
        
        for (let i = 0; i < selected.length; i++) {
          const userId = selected[i].dataset.id;
          const user = users.find(u => u._id === userId);
          
          if (user) {
            const canvas = await generateCatalogueForUser(user);
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            zip.file(formatFilename(user.name), blob);
            
            this.textContent = `⏳ Generating ${i + 1}/${selected.length}...`;
          }
        }
        
        this.textContent = '⏳ Creating ZIP...';
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        
        const today = new Date();
        const dateStr = `${String(today.getDate()).padStart(2, '0')}_${String(today.getMonth() + 1).padStart(2, '0')}_${today.getFullYear()}`;
        saveAs(zipBlob, `catalogues_${dateStr}.zip`);
        
        this.textContent = '✓ Download Complete!';
        setTimeout(() => {
          this.textContent = '📥 Download Selected';
          this.disabled = false;
        }, 2000);
      } catch (error) {
        console.error('Error generating catalogues:', error);
        alert('Error generating catalogues. Please try again.');
        this.textContent = '📥 Download Selected';
        this.disabled = false;
      }
    });

    // Initialize
    loadTemplateImages().then(() => {
      renderUsersTable();
    });
  </script>
</body>
</html>
