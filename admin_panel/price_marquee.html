<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Update Prices - Anocab Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .form-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }

    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .btn-update {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-update:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-update:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .success-msg, .error-msg {
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }

    .success-msg {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
    }

    .error-msg {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid #dc3545;
    }

    .success-msg.show, .error-msg.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .form-card {
        padding: 30px 20px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="location.href='/login_panel/dashboard.html'">← Back to Dashboard</button>
    
    <div class="form-card">
      <h1>💰 Update Material Prices</h1>
      <p class="subtitle">Update the prices displayed on the homepage marquee</p>

      <form id="priceForm">
        <div class="form-group">
          <label for="price_copper">Copper Price (₹/kg)</label>
          <input type="number" id="price_copper" name="price_copper" step="0.01" required placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="price_aluminum_ec">Aluminum EC Price (₹/kg)</label>
          <input type="number" id="price_aluminum_ec" name="price_aluminum_ec" step="0.01" required placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="price_aluminum_alloy">Aluminum Alloy Price (₹/kg)</label>
          <input type="number" id="price_aluminum_alloy" name="price_aluminum_alloy" step="0.01" required placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="price_pvc">PVC Price (₹/kg)</label>
          <input type="number" id="price_pvc" name="price_pvc" step="0.01" required placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="price_lldpe">LLDPE Price (₹/kg)</label>
          <input type="number" id="price_lldpe" name="price_lldpe" step="0.01" required placeholder="0.00">
        </div>

        <button class="btn-update" type="submit" id="updateBtn">
          Update Prices
        </button>

        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>

  <script>
    // JWT Helper Functions
    function getAuthHeaders() {
      const token = localStorage.getItem('authToken');
      return {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      };
    }

    function getAuthToken() {
      return localStorage.getItem('authToken');
    }

    // Check authentication on page load
    (async function checkAuth() {
      const token = getAuthToken();
      
      if (!token) {
        window.location.href = '/login_panel/login.html';
        return;
      }
      
      try {
        const response = await fetch('/check-auth', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        if (!data.authenticated) {
          localStorage.clear();
          window.location.href = '/login_panel/login.html';
        }
      } catch (error) {
        console.error('Auth check failed:', error);
        localStorage.clear();
        window.location.href = '/login_panel/login.html';
      }
    })();

    const API_BASE_URL = window.location.origin || "http://localhost:3000";
    const priceForm = document.getElementById('priceForm');
    const updateBtn = document.getElementById('updateBtn');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    // Load current prices
    async function loadPrices() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/prices`);
        const prices = await response.json();
        
        document.getElementById('price_copper').value = prices.copper;
        document.getElementById('price_aluminum_ec').value = prices.aluminum_ec;
        document.getElementById('price_aluminum_alloy').value = prices.aluminum_alloy;
        document.getElementById('price_pvc').value = prices.pvc;
        document.getElementById('price_lldpe').value = prices.lldpe;
      } catch (error) {
        console.error('Error loading prices:', error);
      }
    }

    // Update prices
    priceForm.addEventListener('submit', async function(e) {
      e.preventDefault();

      // Hide messages
      successMsg.classList.remove('show');
      errorMsg.classList.remove('show');

      // Disable button and show loading
      updateBtn.disabled = true;
      updateBtn.innerHTML = '<span class="loading"></span>Updating...';

      const formData = {
        price_copper: document.getElementById('price_copper').value,
        price_aluminum_ec: document.getElementById('price_aluminum_ec').value,
        price_aluminum_alloy: document.getElementById('price_aluminum_alloy').value,
        price_pvc: document.getElementById('price_pvc').value,
        price_lldpe: document.getElementById('price_lldpe').value
      };

      try {
        const response = await fetch(`${API_BASE_URL}/update-prices`, {
          method: 'POST',
          headers: getAuthHeaders(),
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (response.ok && result.status === 'success') {
          successMsg.textContent = '✓ Prices updated successfully!';
          successMsg.classList.add('show');
          updateBtn.innerHTML = '✓ Updated!';
          
          setTimeout(() => {
            updateBtn.disabled = false;
            updateBtn.innerHTML = 'Update Prices';
          }, 2000);
        } else {
          throw new Error(result.message || 'Failed to update prices');
        }
      } catch (error) {
        console.error('Error:', error);
        errorMsg.textContent = '✗ Failed to update prices. Please try again.';
        errorMsg.classList.add('show');
        updateBtn.disabled = false;
        updateBtn.innerHTML = 'Update Prices';
      }
    });

    // Load prices on page load
    loadPrices();
  </script>
</body>
</html>
