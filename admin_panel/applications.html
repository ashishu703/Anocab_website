<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Applications - Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <script src="/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #013A5B 0%, #1f2f3d 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.1);
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .content {
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, #013A5B 0%, #1f2f3d 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr {
            transition: all 0.3s;
        }

        tbody tr:hover {
            background: #f8f9fa;
            transform: scale(1.01);
        }

        .download-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn:hover {
            background: #229954;
            transform: translateY(-2px);
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 18px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #667eea;
        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-users"></i>
                Job Applications
            </h1>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="nav-links">
                    <a href="price_marquee.html"><i class="fas fa-dollar-sign"></i> Prices</a>
                    <a href="jobs.html"><i class="fas fa-briefcase"></i> Jobs</a>
                    <a href="applications.html"><i class="fas fa-users"></i> Applications</a>
                    <a href="enquiries.html"><i class="fas fa-envelope"></i> Enquiries</a>
                    <a href="brochure-downloads.html"><i class="fas fa-download"></i> Brochures</a>
                    <a href="newsletter.html"><i class="fas fa-newspaper"></i> Newsletter</a>
                    <a href="../login_panel/dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Applications</h3>
                    <div class="number" id="totalApplications">0</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <h3>This Month</h3>
                    <div class="number" id="monthApplications">0</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                    <h3>This Week</h3>
                    <div class="number" id="weekApplications">0</div>
                </div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>Filter by Position</label>
                    <select id="positionFilter" onchange="filterApplications()">
                        <option value="">All Positions</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Search by Name/Email</label>
                    <input type="text" id="searchInput" placeholder="Type to search..." oninput="filterApplications()">
                </div>
            </div>

            <div class="table-container">
                <div id="loadingState" class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading applications...</p>
                </div>
                <table id="applicationsTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Position</th>
                            <th>Qualification</th>
                            <th>Experience</th>
                            <th>Resume</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsBody">
                    </tbody>
                </table>
                <div id="noDataState" class="no-data" style="display: none;">
                    <i class="fas fa-inbox" style="font-size: 64px; color: #ddd; margin-bottom: 20px;"></i>
                    <p>No applications found</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allApplications = [];
        let filteredApplications = [];

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '../login_panel/login.html';
                return false;
            }
            return token;
        }

        // Logout
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userRole');
            window.location.href = '../login_panel/login.html';
        }

        // Fetch applications
        async function fetchApplications() {
            const token = checkAuth();
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE_URL}/fetch-forms`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    alert('Session expired. Please login again.');
                    logout();
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to fetch applications');
                }

                allApplications = await response.json();
                filteredApplications = [...allApplications];
                
                updateStats();
                populatePositionFilter();
                renderApplications();
                
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('applicationsTable').style.display = 'table';
            } catch (error) {
                console.error('Error fetching applications:', error);
                document.getElementById('loadingState').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i>
                    <p>Error loading applications. Please try again.</p>
                `;
            }
        }

        // Update statistics
        function updateStats() {
            const now = new Date();
            const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const oneMonthAgo = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());

            const weekCount = allApplications.filter(app => 
                new Date(app.createdAt) >= oneWeekAgo
            ).length;

            const monthCount = allApplications.filter(app => 
                new Date(app.createdAt) >= oneMonthAgo
            ).length;

            document.getElementById('totalApplications').textContent = allApplications.length;
            document.getElementById('monthApplications').textContent = monthCount;
            document.getElementById('weekApplications').textContent = weekCount;
        }

        // Populate position filter
        function populatePositionFilter() {
            const positions = [...new Set(allApplications.map(app => app.position_applied))];
            const select = document.getElementById('positionFilter');
            
            positions.forEach(position => {
                const option = document.createElement('option');
                option.value = position;
                option.textContent = position;
                select.appendChild(option);
            });
        }

        // Filter applications
        function filterApplications() {
            const positionFilter = document.getElementById('positionFilter').value.toLowerCase();
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            filteredApplications = allApplications.filter(app => {
                const matchesPosition = !positionFilter || app.position_applied.toLowerCase() === positionFilter;
                const matchesSearch = !searchText || 
                    app.first_name.toLowerCase().includes(searchText) ||
                    app.last_name.toLowerCase().includes(searchText) ||
                    app.email.toLowerCase().includes(searchText);
                
                return matchesPosition && matchesSearch;
            });

            renderApplications();
        }

        // Render applications table
        function renderApplications() {
            const tbody = document.getElementById('applicationsBody');
            tbody.innerHTML = '';

            if (filteredApplications.length === 0) {
                document.getElementById('applicationsTable').style.display = 'none';
                document.getElementById('noDataState').style.display = 'block';
                return;
            }

            document.getElementById('applicationsTable').style.display = 'table';
            document.getElementById('noDataState').style.display = 'none';

            filteredApplications.forEach(app => {
                const row = document.createElement('tr');
                const date = new Date(app.createdAt).toLocaleDateString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });

                row.innerHTML = `
                    <td>${date}</td>
                    <td><strong>${app.first_name} ${app.last_name}</strong></td>
                    <td>${app.email}</td>
                    <td>${app.phone_no}</td>
                    <td><span class="badge badge-success">${app.position_applied}</span></td>
                    <td>${app.qualification}</td>
                    <td>${app.experience}</td>
                    <td>
                        <button class="download-btn" onclick="downloadResume('${app._id}', '${app.first_name}_${app.last_name}')">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Download resume
        async function downloadResume(id, name) {
            const token = checkAuth();
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE_URL}/download-resume/${id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to download resume');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${name}_Resume.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('Error downloading resume:', error);
                alert('Failed to download resume. Please try again.');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            fetchApplications();
        });
    </script>
</body>
</html>
