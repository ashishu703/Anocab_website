<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Management - Anocab Admin</title>
  <script src="/config.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
    }

    .btn-primary {
      background: white;
      color: #667eea;
    }

    .btn-primary:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 30px;
      margin-bottom: 30px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #1f2937;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #374151;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .client-card {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .client-card:hover {
      border-color: #667eea;
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .client-logo {
      width: 100%;
      height: 120px;
      object-fit: contain;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .client-name {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 10px;
    }

    .client-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }

    .btn-sm {
      padding: 6px 16px;
      font-size: 12px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #9ca3af;
    }

    .close-btn:hover {
      color: #1f2937;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }

    .status-active {
      background: #d1fae5;
      color: #065f46;
    }

    .status-inactive {
      background: #fee2e2;
      color: #991b1b;
    }

    .inline-row {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .inline-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .preview-container {
      margin-top: 15px;
      display: none;
    }

    .preview-img {
      max-width: 200px;
      max-height: 100px;
      border-radius: 8px;
      border: 2px solid #e5e7eb;
    }

    .url-section-hidden {
      display: none;
    }

    .checkbox-inline {
      margin-right: 8px;
    }

    .error-hint {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏢 Client Management</h1>
    <div class="header-actions">
      <a href="dashboard.html" class="btn btn-primary">← Back to Dashboard</a>
      <button onclick="logout()" class="btn btn-danger">Logout</button>
    </div>
  </div>

  <div class="container">
    <!-- Add Client Form -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Add New Client</h2>
      </div>
      <form id="addClientForm">
        <div class="form-group">
          <label class="form-label">Client Name *</label>
          <input type="text" class="form-input" id="clientName" required placeholder="Enter client name">
        </div>
        
        <div class="form-group">
          <label class="form-label">Logo Upload Method</label>
          <div class="inline-row">
            <label class="inline-label">
              <input type="radio" name="uploadMethod" value="file" checked onchange="toggleUploadMethod()">
              <span>Upload File</span>
            </label>
            <label class="inline-label">
              <input type="radio" name="uploadMethod" value="url" onchange="toggleUploadMethod()">
              <span>Use URL</span>
            </label>
          </div>
        </div>

        <div class="form-group" id="fileUploadSection">
          <label class="form-label">Upload Logo Image *</label>
          <input type="file" class="form-input" id="clientLogoFile" accept="image/*" onchange="previewLogo(this)">
          <small class="error-hint">
            📁 Supported: JPG, PNG, SVG (Max 2MB)
          </small>
          <div id="logoPreview" class="preview-container">
            <img id="previewImage" class="preview-img" alt="Logo preview">
          </div>
        </div>

        <div class="form-group url-section-hidden" id="urlUploadSection">
          <label class="form-label">Logo URL (Cloudinary recommended) *</label>
          <input type="url" class="form-input" id="clientLogoUrl" placeholder="https://res.cloudinary.com/...">
          <small class="error-hint">
            💡 Paste Cloudinary or any image URL here
          </small>
        </div>

        <div class="form-group">
          <label class="form-label">Display Order</label>
          <input type="number" class="form-input" id="clientOrder" value="0" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="clientActive" checked class="checkbox-inline">
            Active (Show on website)
          </label>
        </div>
        <button type="submit" class="btn btn-success" id="submitBtn">Add Client</button>
      </form>
    </div>

    <!-- Clients List -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">All Clients</h2>
        <button onclick="loadClients()" class="btn btn-primary">🔄 Refresh</button>
      </div>
      <div id="clientsList" class="loading">Loading clients...</div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Edit Client</h3>
        <button class="close-btn" onclick="closeEditModal()">×</button>
      </div>
      <form id="editClientForm">
        <input type="hidden" id="editClientId">
        <div class="form-group">
          <label class="form-label">Client Name *</label>
          <input type="text" class="form-input" id="editClientName" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Logo Upload Method</label>
          <div class="inline-row">
            <label class="inline-label">
              <input type="radio" name="editUploadMethod" value="file" checked onchange="toggleEditUploadMethod()">
              <span>Upload File</span>
            </label>
            <label class="inline-label">
              <input type="radio" name="editUploadMethod" value="url" onchange="toggleEditUploadMethod()">
              <span>Use URL</span>
            </label>
          </div>
        </div>

        <div class="form-group" id="editFileUploadSection">
          <label class="form-label">Upload New Logo Image</label>
          <input type="file" class="form-input" id="editClientLogoFile" accept="image/*" onchange="previewEditLogo(this)">
          <div id="editLogoPreview" class="preview-container">
            <img id="editPreviewImage" class="preview-img" alt="Logo preview">
          </div>
        </div>

        <div class="form-group url-section-hidden" id="editUrlUploadSection">
          <label class="form-label">Logo URL *</label>
          <input type="url" class="form-input" id="editClientLogoUrl">
        </div>

        <div class="form-group">
          <label class="form-label">Display Order</label>
          <input type="number" class="form-input" id="editClientOrder">
        </div>
        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="editClientActive" class="checkbox-inline">
            Active (Show on website)
          </label>
        </div>
        <button type="submit" class="btn btn-success" id="editSubmitBtn">Update Client</button>
      </form>
    </div>
  </div>

  <script>
    const API_URL = window.API_BASE_URL || window.location.origin;

    // Toggle upload method
    function toggleUploadMethod() {
      const method = document.querySelector('input[name="uploadMethod"]:checked').value;
      document.getElementById('fileUploadSection').style.display = method === 'file' ? 'block' : 'none';
      document.getElementById('urlUploadSection').style.display = method === 'url' ? 'block' : 'none';
    }

    function toggleEditUploadMethod() {
      const method = document.querySelector('input[name="editUploadMethod"]:checked').value;
      document.getElementById('editFileUploadSection').style.display = method === 'file' ? 'block' : 'none';
      document.getElementById('editUrlUploadSection').style.display = method === 'url' ? 'block' : 'none';
    }

    // Preview logo
    function previewLogo(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('previewImage').src = e.target.result;
          document.getElementById('logoPreview').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function previewEditLogo(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('editPreviewImage').src = e.target.result;
          document.getElementById('editLogoPreview').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // Convert file to base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Check authentication
    async function checkAuth() {
      const token = localStorage.getItem('authToken');
      
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      
      try {
        const response = await fetch(`${API_URL}/check-auth`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        const data = await response.json();
        
        if (!data.authenticated) {
          localStorage.clear();
          window.location.href = 'login.html';
        }
      } catch (error) {
        console.error('Auth check failed:', error);
        localStorage.clear();
        window.location.href = 'login.html';
      }
    }

    // Logout
    async function logout() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('userEmail');
      localStorage.removeItem('userRole');
      window.location.href = 'login.html';
    }

    // Load clients
    async function loadClients() {
      try {
        const token = localStorage.getItem('authToken');
        if (!token) {
          window.location.href = 'login.html';
          return;
        }
        
        const response = await fetch(`${API_URL}/api/admin/clients`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!response.ok) {
          if (response.status === 401) {
            localStorage.clear();
            window.location.href = 'login.html';
            return;
          }
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        const clients = Array.isArray(data) ? data : [];

        const clientsList = document.getElementById('clientsList');

        if (clients.length === 0) {
          clientsList.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🏢</div>
              <h3>No clients yet</h3>
              <p>Add your first client using the form above</p>
            </div>
          `;
          return;
        }

        clientsList.innerHTML = `
          <div class="clients-grid">
            ${clients.map(client => `
              <div class="client-card">
                <img src="${client.logo}" alt="${client.name}" class="client-logo" onerror="this.src='https://via.placeholder.com/200x100/667eea/FFFFFF?text=Logo'">
                <div class="client-name">${client.name}</div>
                <span class="status-badge ${client.active ? 'status-active' : 'status-inactive'}">
                  ${client.active ? '✓ Active' : '✗ Inactive'}
                </span>
                <div class="client-actions">
                  <button onclick="editClient('${client._id}')" class="btn btn-primary btn-sm">Edit</button>
                  <button onclick="deleteClient('${client._id}', '${client.name}')" class="btn btn-danger btn-sm">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (error) {
        console.error('Error loading clients:', error);
        document.getElementById('clientsList').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">❌</div>
            <h3>Error loading clients</h3>
            <p>${error.message}</p>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">Make sure backend server is running on port 3000</p>
          </div>
        `;
      }
    }

    // Add client
    document.getElementById('addClientForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Adding...';

      try {
        const method = document.querySelector('input[name="uploadMethod"]:checked').value;
        let logoUrl;

        if (method === 'file') {
          const fileInput = document.getElementById('clientLogoFile');
          if (!fileInput.files || !fileInput.files[0]) {
            alert('❌ Please select a logo file');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Add Client';
            return;
          }

          // Check file size (max 2MB)
          if (fileInput.files[0].size > 2 * 1024 * 1024) {
            alert('❌ File size must be less than 2MB');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Add Client';
            return;
          }

          // Convert to base64
          logoUrl = await fileToBase64(fileInput.files[0]);
        } else {
          logoUrl = document.getElementById('clientLogoUrl').value;
          if (!logoUrl) {
            alert('❌ Please enter a logo URL');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Add Client';
            return;
          }
        }

        const clientData = {
          name: document.getElementById('clientName').value,
          logo: logoUrl,
          order: parseInt(document.getElementById('clientOrder').value) || 0,
          active: document.getElementById('clientActive').checked
        };

        const token = localStorage.getItem('authToken');
        if (!token) {
          alert('❌ Please login again');
          window.location.href = 'login.html';
          return;
        }

        const response = await fetch(`${API_URL}/api/admin/clients`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(clientData)
        });

        const result = await response.json();

        if (response.ok) {
          alert('✅ Client added successfully!');
          document.getElementById('addClientForm').reset();
          document.getElementById('logoPreview').style.display = 'none';
          toggleUploadMethod();
          loadClients();
        } else {
          if (response.status === 401) {
            localStorage.clear();
            alert('❌ Session expired. Please login again.');
            window.location.href = 'login.html';
          } else {
            alert('❌ Error: ' + result.error);
          }
        }
      } catch (error) {
        console.error('Error adding client:', error);
        alert('❌ Error adding client');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Add Client';
      }
    });

    // Edit client
    async function editClient(id) {
      try {
        const token = localStorage.getItem('authToken');
        if (!token) {
          window.location.href = 'login.html';
          return;
        }
        
        const response = await fetch(`${API_URL}/api/admin/clients`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!response.ok) {
          if (response.status === 401) {
            localStorage.clear();
            window.location.href = 'login.html';
            return;
          }
          throw new Error('Failed to load clients');
        }
        
        const clients = await response.json();
        const client = clients.find(c => c._id === id);

        if (client) {
          document.getElementById('editClientId').value = client._id;
          document.getElementById('editClientName').value = client.name;
          document.getElementById('editClientLogoUrl').value = client.logo;
          document.getElementById('editClientOrder').value = client.order;
          document.getElementById('editClientActive').checked = client.active;
          
          // Set to URL method by default and show current logo
          document.querySelector('input[name="editUploadMethod"][value="url"]').checked = true;
          toggleEditUploadMethod();
          
          document.getElementById('editModal').classList.add('active');
        }
      } catch (error) {
        console.error('Error loading client:', error);
        alert('❌ Error loading client');
      }
    }

    // Update client
    document.getElementById('editClientForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('editSubmitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      try {
        const id = document.getElementById('editClientId').value;
        const method = document.querySelector('input[name="editUploadMethod"]:checked').value;
        let logoUrl;

        if (method === 'file') {
          const fileInput = document.getElementById('editClientLogoFile');
          if (fileInput.files && fileInput.files[0]) {
            // Check file size
            if (fileInput.files[0].size > 2 * 1024 * 1024) {
              alert('❌ File size must be less than 2MB');
              submitBtn.disabled = false;
              submitBtn.textContent = 'Update Client';
              return;
            }
            logoUrl = await fileToBase64(fileInput.files[0]);
          } else {
            // Keep existing logo
            logoUrl = document.getElementById('editClientLogoUrl').value;
          }
        } else {
          logoUrl = document.getElementById('editClientLogoUrl').value;
        }

        const clientData = {
          name: document.getElementById('editClientName').value,
          logo: logoUrl,
          order: parseInt(document.getElementById('editClientOrder').value) || 0,
          active: document.getElementById('editClientActive').checked
        };

        const token = localStorage.getItem('authToken');
        if (!token) {
          alert('❌ Please login again');
          window.location.href = 'login.html';
          return;
        }

        const response = await fetch(`${API_URL}/api/admin/clients/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(clientData)
        });

        const result = await response.json();

        if (response.ok) {
          alert('✅ Client updated successfully!');
          closeEditModal();
          loadClients();
        } else {
          alert('❌ Error: ' + result.error);
        }
      } catch (error) {
        console.error('Error updating client:', error);
        alert('❌ Error updating client');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Client';
      }
    });

    // Delete client
    async function deleteClient(id, name) {
      if (!confirm(`Are you sure you want to delete "${name}"?`)) {
        return;
      }

      try {
        const token = localStorage.getItem('authToken');
        if (!token) {
          alert('❌ Please login again');
          window.location.href = 'login.html';
          return;
        }
        
        const response = await fetch(`${API_URL}/api/admin/clients/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const result = await response.json();

        if (response.ok) {
          alert('✅ Client deleted successfully!');
          loadClients();
        } else {
          if (response.status === 401) {
            localStorage.clear();
            alert('❌ Session expired. Please login again.');
            window.location.href = 'login.html';
          } else {
            alert('❌ Error: ' + result.error);
          }
        }
      } catch (error) {
        console.error('Error deleting client:', error);
        alert('❌ Error deleting client');
      }
    }

    // Close edit modal
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      document.getElementById('editLogoPreview').style.display = 'none';
    }

    // Initialize
    checkAuth();
    loadClients();
  </script>
</body>
</html>
