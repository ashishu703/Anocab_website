<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raw Material Price Approval</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 40px;
      background: #eef2f5;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 14px;
      text-align: center;
    }

    th {
      background-color: #f7f9fb;
      color: #444;
    }

    tr:hover {
      background-color: #f1f7ff;
    }

    .actions {
      margin-top: 20px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin: 0 10px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h2>Raw Material Price Approval</h2>

  <table id="priceTable">
    <thead>
      <tr>
        <th>Select</th>
        <th>RAW MATERIAL</th>
        <th>BASIC</th>
        <th>GST (%)</th>
        <th>MRP</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="actions">
    <button onclick="approveSelected()">✅ Approve Selected</button>
    <button onclick="rejectSelected()">❌ Reject Selected</button>
  </div>

  <script src="/config.js"></script>
<script>
    
    async function loadPrices() {
      const res = await fetch(`${API_BASE_URL}/api/prices/pending`);
      const data = await res.json();
      const tbody = document.querySelector('#priceTable tbody');
      tbody.innerHTML = '';

      data.forEach(item => {
        const row = `
          <tr>
            <td><input type="checkbox" value="${item._id}"></td>
            <td>${item.item}</td>
            <td>${item.basePrice}</td>
            <td>${item.gst}</td>
            <td>${(item.basePrice + item.basePrice * item.gst / 100).toFixed(2)}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    }

    async function approveSelected() {
      const selectedIds = getSelectedIds();
      if (!selectedIds.length) return alert("No items selected");

      const res = await fetch(`${API_BASE_URL}/api/prices/approve-selected`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selectedIds }),
      });

      const result = await res.json();
      alert(result.message || "Approved!");
      loadPrices();
    }

    async function rejectSelected() {
      const selectedIds = getSelectedIds();
      if (!selectedIds.length) return alert("No items selected");

      const res = await fetch(`${API_BASE_URL}/api/prices/reject-selected`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ selectedIds }),
      });

      const result = await res.json();
      alert(result.message || "Rejected!");
      loadPrices();
    }

    function getSelectedIds() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
      return Array.from(checkboxes).map(cb => cb.value);
    }

    // Load prices when the page loads
    window.onload = loadPrices;
  </script>

</body>
<script src="/config.js"></script>
<script>
// Inactivity auto-logout (30s)
(function() {
  let timer;
  function resetTimer() {
    clearTimeout(timer);
    timer = setTimeout(logout, 30000);
  }
  function logout() {
    fetch('/logout', {method:'POST'}).then(()=>{
      window.location.href = '/login_panel/login.html';
    });
  }
  ['mousemove','keydown','mousedown','touchstart'].forEach(evt =>
    window.addEventListener(evt, resetTimer, true));
  resetTimer();
})();
</script>
</html>
