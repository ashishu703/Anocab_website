<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raw Material Price Approval</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 40px;
      background: #eef2f5;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 14px;
      text-align: center;
    }

    th {
      background-color: #f7f9fb;
      color: #444;
    }

    tr:hover {
      background-color: #f1f7ff;
    }

    .actions {
      margin-top: 20px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin: 0 10px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h2>Raw Material Price Approval</h2>

  <table id="priceTable">
    <thead>
      <tr>
        <th>Select</th>
        <th>RAW MATERIAL</th>
        <th>BASIC</th>
        <th>GST (%)</th>
        <th>MRP</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="actions">
    <button onclick="approveSelected()">✅ Approve Selected</button>
    <button onclick="rejectSelected()">❌ Reject Selected</button>
  </div>

  <script src="/config.js"></script>
  <script>
    // Check authentication
    (async function checkAuth() {
      const token = localStorage.getItem('authToken');
      
      if (!token) {
        window.location.href = '/login_panel/login.html';
        return;
      }
      
      try {
        const response = await fetch('/check-auth', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        const data = await response.json();
        
        if (!data.authenticated) {
          localStorage.clear();
          window.location.href = '/login_panel/login.html';
        }
      } catch (error) {
        console.error('Auth check failed:', error);
        localStorage.clear();
        window.location.href = '/login_panel/login.html';
      }
    })();
    
    async function loadPrices() {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/login_panel/login.html';
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE_URL}/api/prices/pending`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!res.ok) {
          if (res.status === 401) {
            localStorage.clear();
            window.location.href = '/login_panel/login.html';
            return;
          }
          throw new Error('Failed to load prices');
        }
        
        const data = await res.json();
        const tbody = document.querySelector('#priceTable tbody');
        tbody.innerHTML = '';

        if (data.prices && data.prices.length > 0) {
          data.prices.forEach(item => {
            const row = `
              <tr>
                <td><input type="checkbox" value="${item._id}"></td>
                <td>${item.item}</td>
                <td>${item.basePrice}</td>
                <td>${item.gst}</td>
                <td>${(item.basePrice + item.basePrice * item.gst / 100).toFixed(2)}</td>
              </tr>
            `;
            tbody.innerHTML += row;
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No pending prices</td></tr>';
        }
      } catch (error) {
        console.error('Error loading prices:', error);
        document.querySelector('#priceTable tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;">Error loading prices</td></tr>';
      }
    }

    async function approveSelected() {
      const selectedIds = getSelectedIds();
      if (!selectedIds.length) return alert("No items selected");

      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/login_panel/login.html';
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/api/prices/approve-selected`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ selectedIds }),
        });

        if (!res.ok) {
          if (res.status === 401) {
            localStorage.clear();
            alert('Session expired. Please login again.');
            window.location.href = '/login_panel/login.html';
            return;
          }
          throw new Error('Failed to approve');
        }

        const result = await res.json();
        alert(result.message || "Approved!");
        loadPrices();
      } catch (error) {
        console.error('Error approving:', error);
        alert('Error approving prices');
      }
    }

    async function rejectSelected() {
      const selectedIds = getSelectedIds();
      if (!selectedIds.length) return alert("No items selected");

      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/login_panel/login.html';
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/api/prices/reject-selected`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ selectedIds }),
        });

        if (!res.ok) {
          if (res.status === 401) {
            localStorage.clear();
            alert('Session expired. Please login again.');
            window.location.href = '/login_panel/login.html';
            return;
          }
          throw new Error('Failed to reject');
        }

        const result = await res.json();
        alert(result.message || "Rejected!");
        loadPrices();
      } catch (error) {
        console.error('Error rejecting:', error);
        alert('Error rejecting prices');
      }
    }

    function getSelectedIds() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
      return Array.from(checkboxes).map(cb => cb.value);
    }

    // Load prices when the page loads
    window.onload = loadPrices;
  </script>

</body>
</html>
