<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Enquiries - Anocab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1200px;
      margin: 30px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 24px 16px 32px 16px;
    }
    .table-responsive {
      overflow-x: auto;
    }
    .pagination-controls {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 18px;
      gap: 10px;
    }
    h2 {
      text-align: center;
      margin-bottom: 18px;
    }
    .filter-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 18px;
      gap: 12px;
    }
    .filter-row label {
      font-size: 15px;
      color: #333;
    }
    .filter-row input[type="date"] {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #bbb;
      font-size: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      padding: 8px 6px;
      border: 1px solid #ddd;
      text-align: left;
      font-size: 15px;
    }
    th {
      background: #f0f0f0;
      font-weight: 600;
    }
    tr:nth-child(even) {
      background: #fafafa;
    }
    .no-data {
      text-align: center;
      color: #888;
      padding: 24px 0;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>All Enquiries</h2>
    <div class="filter-row">
      <label for="fromDate">From:</label>
      <input type="date" id="fromDate">
      <label for="toDate">To:</label>
      <input type="date" id="toDate">
      <button id="filterBtn" type="button">Filter</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>
    <div class="table-responsive">
      <table id="enquiryTable">
        <thead>
          <tr>
            <th scope="col">Date</th>
            <th scope="col">Full Name</th>
            <th scope="col">Company Name</th>
            <th scope="col">Email Address</th>
            <th scope="col">Phone Number</th>
            <th scope="col">Address</th>
            <th scope="col">Product Specification</th>
            <th scope="col">Product Type</th>
            <th scope="col">Product Name</th>
            <th scope="col">Enquiry Message</th>
          </tr>
        </thead>
        <tbody id="enquiryTableBody">
          <tr><td colspan="9" class="no-data">Loading...</td></tr>
        </tbody>
      </table>
      <div id="paginationControls" class="pagination-controls">
        <button id="prevPageBtn" type="button">Prev</button>
        <span id="pageInfo"></span>
        <button id="nextPageBtn" type="button">Next</button>
      </div>
    </div>
  </div>
  <script>
    let currentPage = 1;
    let totalPages = 1;
    const limit = 20;

    function formatAddress(addr) {
      if (!addr || typeof addr !== 'object') return '';
      return [addr.street, addr.city, addr.state, addr.zip].filter(Boolean).join(', ');
    }
    function formatDate(dt) {
      if (!dt) return '';
      const d = new Date(dt);
      return d.toLocaleString();
    }
    async function fetchEnquiries(page = 1, from = '', to = '') {
      let url = `/api/enquiry?page=${page}&limit=${limit}`;
      if (from) url += `&from=${from}`;
      if (to) url += `&to=${to}`;
      const res = await fetch(url);
      if (!res.ok) return { enquiries: [], total: 0, page: 1, totalPages: 1, limit };
      return await res.json();
    }
    function renderTable(data) {
      const tbody = document.getElementById('enquiryTableBody');
      tbody.innerHTML = '';
      const enquiries = data.enquiries || [];
      if (!enquiries.length) {
        tbody.innerHTML = `<tr><td colspan="11" class="no-data">No data found.</td></tr>`;
        return;
      }
      enquiries.forEach(enquiry => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${formatDate(enquiry.createdAt)}</td>
          <td>${enquiry.fullName || ''}</td>
          <td>${enquiry.companyName || ''}</td>
          <td>${enquiry.emailAddress || ''}</td>
          <td>${enquiry.phoneNumber || ''}</td>
          <td>${enquiry.address || ''}</td>
          <td>${enquiry.productSpecification || ''}</td>
          <td>${enquiry.productType || ''}</td>
          <td>${enquiry.productName || ''}</td>
          <td>${enquiry.enquiryMessage || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }
    async function loadTable(page = 1) {
      document.getElementById('enquiryTableBody').innerHTML = '<tr><td colspan="11" class="no-data">Loading...</td></tr>';
      const from = document.getElementById('fromDate').value;
      const to = document.getElementById('toDate').value;
      try {
        const resp = await fetchEnquiries(page, from, to);
        totalPages = resp.totalPages || 1;
        currentPage = resp.page || 1;
        renderTable(resp);
        updatePagination();
      } catch (err) {
        document.getElementById('enquiryTableBody').innerHTML = '<tr><td colspan="11" class="no-data">Error loading data.</td></tr>';
      }
    }
    document.getElementById('filterBtn').onclick = () => loadTable(1);
    document.getElementById('clearBtn').onclick = function() {
      document.getElementById('fromDate').value = '';
      document.getElementById('toDate').value = '';
      loadTable(1);
    };
    function updatePagination() {
      document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prevPageBtn').disabled = currentPage <= 1;
      document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
    }
    document.getElementById('prevPageBtn').onclick = function() {
      if (currentPage > 1) loadTable(currentPage - 1);
    };
    document.getElementById('nextPageBtn').onclick = function() {
      if (currentPage < totalPages) loadTable(currentPage + 1);
    };
    window.onload = () => loadTable(1);
  </script>
</body>
<script>
  // Inactivity auto-logout (30s)
  (function() {
    let timer;
    function resetTimer() {
      clearTimeout(timer);
      timer = setTimeout(logout, 30000);
    }
    function logout() {
      fetch('/logout', {method:'POST'}).then(()=>{
        window.location.href = '/login_panel/login.html';
      });
    }
    ['mousemove','keydown','mousedown','touchstart'].forEach(evt =>
      window.addEventListener(evt, resetTimer, true));
    resetTimer();
  })();
  </script>
</html>
