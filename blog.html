        /* 🎯 1. Hero Section - Glass Effect + Gradient */

            overflow: hidden;

        .reading-time {

        .blog-meta-item:nth-child(2) i {

        .blog-meta-item:nth-child(3) i {
            color: #f59e0b;
        }

        .blog-meta-item:nth-child(4) i {

        }

        /* 🎯 Progress Bar */
        .reading-progress {

            top: 0;
            left: 0;
            width: 0%;

            transition: width 0.1s ease;

        .blog-container {
            max-width: 100%;
            margin: 30px auto;
            padding: 0 40px;
        }

        .blog-layout {
            display: grid;

            max-width: 1400px;

        .blog-post-title {

            color: #013A5B;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .blog-post-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;

        .blog-post-meta span {

            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .blog-post-meta i {
            color: #013A5B;
        }

        /* Featured Image */
        .blog-main {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);

        .blog-featured-image {

    <script>
        // 🎯 Reading Progress Bar
        window.addEventListener('scroll', function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('readingProgress').style.width = scrolled + '%';
        });

        // Calculate reading time (average 200 words per minute)
        function calculateReadingTime(text) {
            const wordsPerMinute = 200;
            const words = text.trim().split(/\s+/).length;
            const minutes = Math.ceil(words / wordsPerMinute);
            return minutes;
        }

        // Load header and footer from index.html
        $(document).ready(function() {
            // Load header
            $.get('/', function(data) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(data, 'text/html');
                
                // Extract header
                const header = doc.querySelector('header');
                if (header) {
                    $('#header-container').html(header.outerHTML);
                }
                
                // Extract footer
                const footer = doc.querySelector('footer');
                if (footer) {
                    $('#footer-container').html(footer.outerHTML);
                }

                // Reinitialize any header scripts
                if (typeof openMenu === 'function') {
                    // Menu is ready
                }
            });

            // Load blog content
            loadBlog();
        });

        // Get slug from URL
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');

        if (!slug) {
            window.location.href = '/';
        }

        // Load blog function
        async function loadBlog() {
            try {
                const apiUrl = window.API_BASE_URL || 'http://localhost:3000';
                const response = await fetch(`${apiUrl}/api/blogs/${slug}`);
                
                if (!response.ok) {
                    throw new Error('Blog not found');
                }
                
                const { blog, relatedBlogs } = await response.json();
                
                // Update page title
                document.title = blog.title + ' - Anocab';
                
                // Calculate reading time
                const readingTime = calculateReadingTime(blog.content);
                
                // Format content - Better structure with sections
                const formattedContent = blog.content
                    .split('\n')
                    .map(line => line.trim())
                    .filter(line => line)
                    .map(line => {
                        // Check if line starts with emoji (section heading)
                        const emojiRegex = /^(⚙️|⚡|🏭|📊|💡|🔧|📈|🌟|✨|🎯)/;
                        if (emojiRegex.test(line)) {
                            return `<h3 style="font-size: 18px; font-weight: 700; color: #013A5B; margin-top: 25px; margin-bottom: 12px;">${line}</h3>`;
                        }
                        // Check if it's a list item
                        else if (line.match(/^[-•]/)) {
                            return `<li style="margin-bottom: 8px; margin-left: 20px;">${line.replace(/^[-•]\s*/, '')}</li>`;
                        }
                        // Regular paragraph
                        else {
                            return `<p style="margin-bottom: 12px; line-height: 1.7;">${line}</p>`;
                        }
                    })
                    .join('')
                    .replace(/(<li[^>]*>.*?<\/li>)/gs, '<ul style="margin: 10px 0 15px 0; list-style: disc; padding-left: 20px;">$1</ul>');
                
                // Get current URL for sharing
                const currentUrl = encodeURIComponent(window.location.href);
                const blogTitle = encodeURIComponent(blog.title);
                
                // Render blog
                $('#blogDetail').html(`
                    <div class="blog-hero">
                        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
                            <a href="/" class="back-btn">
                                <i class="fa fa-arrow-left"></i>
                                Back to Home
                            </a>
                            <div class="blog-hero-content">
                                <div class="reading-time">
                                    <i class="fa fa-clock"></i>
                                    ${readingTime} min read
                                </div>
                                <h1>${blog.title}</h1>
                                <div class="blog-meta">
                                    <div class="blog-meta-item">
                                        <i class="fa fa-calendar"></i>
                                        <span>${new Date(blog.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                    </div>
                                    <div class="blog-meta-item">
                                        <i class="fa fa-user"></i>
                                        <span>${blog.author}</span>
                                    </div>
                                    <div class="blog-meta-item">
                                        <i class="fa fa-eye"></i>
                                        <span>${blog.views} views</span>
                                    </div>
                                    <div class="blog-meta-item">
                                        <i class="fa fa-tag"></i>
                                        <span>${blog.category}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="blog-container">
                        <div class="blog-layout">
                            <div class="blog-main">
                                <h2 class="blog-post-title">${blog.title}</h2>
                                <div class="blog-post-meta">
                                    <span><i class="fa fa-calendar"></i> ${new Date(blog.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</span>
                                    <span><i class="fa fa-user"></i> ${blog.author}</span>
                                    <span><i class="fa fa-clock"></i> ${readingTime} Min Read</span>
                                </div>
                                
                                <div class="blog-image-wrapper">
                                    <img src="${blog.image}" alt="${blog.title}" class="blog-featured-image" onerror="this.src='https://via.placeholder.com/900x500/013A5B/FFFFFF?text=Blog+Image'">
                                </div>
                                
                                <div class="blog-content-wrapper">
                                    <div class="blog-content">
                                        ${formattedContent}
                                    </div>

                                    <!-- Share Section -->
                                    <div class="share-section-simple">
                                        <h4>Share This Article:</h4>
                                        <div class="share-icons">
                                            <a href="https://wa.me/?text=${blogTitle}%20-%20${currentUrl}" target="_blank" class="share-icon whatsapp" title="Share on WhatsApp">
                                                <i class="fab fa-whatsapp"></i>
                                            </a>
                                            <a href="https://www.linkedin.com/sharing/share-offsite/?url=${currentUrl}" target="_blank" class="share-icon linkedin" title="Share on LinkedIn">
                                                <i class="fab fa-linkedin"></i>
                                            </a>
                                            <a href="https://www.facebook.com/sharer/sharer.php?u=${currentUrl}" target="_blank" class="share-icon facebook" title="Share on Facebook">
                                                <i class="fab fa-facebook"></i>
                                            </a>
                                            <a href="mailto:?subject=${blogTitle}&body=${currentUrl}" class="share-icon email" title="Share via Email">
                                                <i class="fa fa-envelope"></i>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Related Articles -->
                                ${relatedBlogs.length > 0 ? `
                                    <div class="related-articles-section">
                                        <h3>Related Articles</h3>
                                        <div class="related-articles-grid">
                                            ${relatedBlogs.map(related => `
                                                <a href="/blog.html?slug=${related.slug}" class="related-article-card">
                                                    <img src="${related.image}" alt="${related.title}" onerror="this.src='https://via.placeholder.com/300x200/013A5B/FFFFFF?text=Blog+Image'">
                                                    <div class="related-card-content">
                                                        <h4>${related.title}</h4>
                                                        <p class="related-card-date">${new Date(related.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })} • ${calculateReadingTime(related.content || '')} Min Read</p>
                                                    </div>
                                                </a>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>

                            <aside class="blog-sidebar">
                                <div class="sidebar-section">
                                    <h3 class="sidebar-title">Search</h3>
                                    <div class="search-box">
                                        <input type="text" placeholder="Search articles..." class="search-input">
                                        <button class="search-btn"><i class="fa fa-search"></i></button>
                                    </div>
                                </div>

                                <div class="sidebar-section">
                                    <h3 class="sidebar-title">Categories</h3>
                                    <div class="categories-list">
                                        <a href="/?category=Industry Insights" class="category-item">Industry Insights <i class="fa fa-chevron-right"></i></a>
                                        <a href="/?category=Product Knowledge" class="category-item">Product Knowledge <i class="fa fa-chevron-right"></i></a>
                                        <a href="/?category=Company Updates" class="category-item">Company Updates <i class="fa fa-chevron-right"></i></a>
                                        <a href="/?category=Market Trends" class="category-item">Market Trends <i class="fa fa-chevron-right"></i></a>
                                        <a href="/?category=Sustainability" class="category-item">Sustainability <i class="fa fa-chevron-right"></i></a>
                                    </div>
                                </div>

                                ${relatedBlogs.length > 0 ? `
                                    <div class="sidebar-section">
                                        <h3 class="sidebar-title">Recent Posts</h3>
                                        <div class="recent-posts-list">
                                            ${relatedBlogs.slice(0, 3).map(related => `
                                                <a href="/blog.html?slug=${related.slug}" class="recent-post-item">
                                                    <img src="${related.image}" alt="${related.title}" onerror="this.src='https://via.placeholder.com/80x80/013A5B/FFFFFF?text=Blog'">
                                                    <div class="recent-post-content">
                                                        <h4>${related.title}</h4>
                                                        <p>${new Date(related.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</p>
                                                    </div>
                                                </a>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </aside>
                        </div>
                    </div>
                `);
            } catch (error) {
                console.error('Error loading blog:', error);
                $('#blogDetail').html(`
                    <div class="loading">
                        <i class="fa fa-exclamation-circle" style="font-size: 48px; color: #dc3545;"></i>
                        <p style="margin-top: 20px; color: #dc3545; font-size: 18px;">Blog not found</p>
                        <a href="/" style="color: #013A5B; text-decoration: underline; margin-top: 20px; display: inline-block; font-size: 16px;">Go back to home</a>
                    </div>
                `);
            }
        }
    </script>
</body>
</html>
