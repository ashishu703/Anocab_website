<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enquiry Form - Anocab</title>
  <link href="https://res.cloudinary.com/drpbrn2ax/image/upload/v1742800584/anocab1_uavzrx.webp" rel="shortcut icon" type="image/png">
  
  <!-- Icon fonts -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link href="CSS/flaticon.css" rel="stylesheet">
  <!-- Bootstrap core CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
  <link href="CSS/animate.min.css" rel="stylesheet">
  <!-- Plugins for this template -->
  <link href="CSS/animate.css" rel="stylesheet">
  <link href="CSS/owl.carousel.css" rel="stylesheet">
  <link href="CSS/owl.theme.css" rel="stylesheet">
  <link href="CSS/slick.css" rel="stylesheet">
  <link href="CSS/slick-theme.css" rel="stylesheet">
  <link href="CSS/owl.transitions.css" rel="stylesheet">
  <link href="CSS/jquery.fancybox.css" rel="stylesheet">
  <link href="CSS/jquery.mCustomScrollbar.min.css" rel="stylesheet">
  <!-- Custom styles for this template -->
  <link href="style.css" rel="stylesheet">
  <link href="CSS/index.css" rel="stylesheet">
  <link href="CSS/toastr.min.css" rel="stylesheet"/>
  
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 0;
      margin: 0;
      background: linear-gradient(120deg, #e0eafc 0%, #cfdef3 100%);
      min-height: 100vh;
    }
    .enquiry-page-wrapper {
      padding: 40px 0;
    }
    .form-container {
      background: #fff;
      padding: 32px 24px;
      border-radius: 16px;
      max-width: 480px;
      margin: 32px auto;
      box-shadow: 0 8px 32px rgba(44,62,80,0.10), 0 1.5px 8px rgba(44,62,80,0.05);
      transition: box-shadow 0.2s;
      overflow: visible;
      position: relative;
    }
    .form-container:hover {
      box-shadow: 0 12px 40px rgba(44,62,80,0.13), 0 2px 12px rgba(44,62,80,0.08);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 28px;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1 1 140px;
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
      position: relative;
    }
    #subProductGroup,
    #otherCommentGroup {
      display: flex !important;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }
    #subProduct, #otherComment {
      z-index: 3;
      position: relative;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }
    label {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 7px;
      border: 1px solid #bfc9d1;
      font-size: 1rem;
      background: #f9fbfc;
      color: #2c3e50;
      transition: border 0.2s;
      box-sizing: border-box;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border: 1.5px solid #4CAF50;
      background: #fff;
    }
    textarea {
      resize: vertical;
      min-height: 70px;
      max-height: 180px;
    }
    button {
      background: linear-gradient(90deg,#4CAF50 0%,#43cea2 100%);
      color: #fff;
      padding: 14px 0;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      width: 100%;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(44,62,80,0.07);
      transition: background 0.18s, box-shadow 0.2s;
    }
    button:hover, button:focus {
      background: linear-gradient(90deg,#43cea2 0%,#4CAF50 100%);
      box-shadow: 0 4px 14px rgba(44,62,80,0.12);
    }
    ::placeholder {
      color: #bfc9d1;
      opacity: 1;
      font-size: 0.97rem;
    }
    /* Ensure dropdowns stay inside the form */
    #subProductGroup,
    #otherCommentGroup {
      display: flex !important;
      flex-direction: column;
      position: relative;
      z-index: 2;
    }
    select {
      z-index: 3;
      position: relative;
    }
    /* Responsive Styles */
    @media (max-width: 600px) {
      .form-container {
        padding: 18px 5vw;
        max-width: 98vw;
        margin: 18px 1vw;
        border-radius: 10px;
      }
      h2 {
        font-size: 1.35rem;
        margin-bottom: 18px;
      }
      .form-row {
        flex-direction: column;
        gap: 0;
        margin-bottom: 6px;
      }
      .form-group {
        margin-bottom: 8px;
      }
      button {
        font-size: 1rem;
        padding: 12px 0;
      }
    }
    /* Custom scrollbar for textarea (optional, looks modern) */
    textarea::-webkit-scrollbar {
      width: 7px;
      background: #f4f4f4;
    }
    textarea::-webkit-scrollbar-thumb {
      background: #bfc9d1;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- start preloader -->
    <div class="preloader">
      <div class="preloader-inner">
        <img src="https://res.cloudinary.com/drpbrn2ax/image/upload/v1742800560/prealoader2_zqp42i.gif" alt="Loader" style="background:transparent">
      </div>
    </div>
    <!-- end preloader -->

    <!-- Header will be loaded here -->
    <div id="header-container"></div>

    <div class="enquiry-page-wrapper">

<div class="form-container">
  <h2>Anocab Enquiry Form</h2>
  <form id="enquiryForm">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name:</label>
        <input type="text" name="fullName" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>Company Name: </label>
        <input type="text" name="companyName" required autocomplete="off">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email Address:</label>
        <input type="email" name="email" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>Phone Number:</label>
        <input type="tel" name="phone" required autocomplete="off">
      </div>
    </div>

    <div class="form-group">
      <label>Address:</label>
      <input type="text" name="address">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Product Type</label>
        <select id="productType" required>
          <option value="">-- Select Product --</option>
          <option value="domestic">Domestic Cables</option>
          <option value="industrial">Industrial Cables</option>
          <option value="agricultural">Agricultural Wires</option>
          <option value="networking">Networking Cables</option>
          <option value="others">Others</option>
        </select>
      </div>

      <div class="form-group" id="subProductGroup" style="display: none;">
        <label>Product Name</label>
        <select id="subProduct" required></select>
      </div>
    </div>

    <div class="form-group" id="otherCommentGroup" style="display: none;">
      <label>Product Specification</label>
      <input type="text" id="otherComment" placeholder="Please specify...">
    </div>

    <div class="form-group" style="margin-bottom: 20px;">
      <label>Enquiry Message</label>
      <textarea name="message" placeholder="Your enquiry..."></textarea>
    </div>

    <button type="submit">Submit Enquiry</button>
  </form>
</div>

    </div>

    <!-- Footer will be loaded here -->
    <div id="footer-container"></div>
  </div>

<!-- Scripts -->
<script src="js/jquery.min.js"></script>
<script src="js/toastr.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/jquery-plugin-collection.js"></script>
<script src="js/jsscript.js"></script>
<script src="js/wow.min.js"></script>
<script src="/config.js"></script>
<script>
  // Load header and footer from index.html
  $(document).ready(function() {
    // Load header
    $.get('/', function(data) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(data, 'text/html');
      
      // Extract header
      const header = doc.querySelector('header');
      if (header) {
        $('#header-container').html(header.outerHTML);
      }
      
      // Extract footer
      const footer = doc.querySelector('footer');
      if (footer) {
        $('#footer-container').html(footer.outerHTML);
      }
    });
  });

  const subProductsData = {
    domestic: [
      "-- Select Product --",
      "Multistrand single Core Copper Wire",
      "Multi Core Copper Cable",
      "PVC Insulated single Core Aluminium Cable",
      "Twin Twisted Copper Wire",
      "Speaker Cable",
      "Co-axial Cable",
      "Automobile Wire",
      "Single Core PVC Insulated Aluminium/Copper Armoured/Unarmoured Cable",
      "Multi Core PVC Insulated Aluminum Unarmoured Cable"
    ],
    industrial: [
      "-- Select Product --",
      "Armoured Unarmoured PVC Insulated Copper Control Cable",
      "Multi Core XLPE Insulated Aluminium Armoured Cable",
      "Multi core XLPE Insulated Aluminium Unarmoured Cable",
      "PVC Insulated Multicore Aluminium Cable",
      "Single Core XLPE Insulated Aluminium/Copper Armoured/Unarmoured Cable",
      "Telecom Switch Board Cables",
      "Aluminium COnductor Galvanised Steel Reinforced",
      "All Aluminium Alloy Conductor",
      "Aerial Bunch cable",
      "Paper Covered Aluminium Conductor"
    ],
    agricultural: [
      "-- Select Product --",
      "PVC Insulated Submersible Cable",
      "Submersible Winding Wire",
      "Multicore PVC Insulated Aluminium Armoured Cable",
      "Aerial bunched Cable"
    ],
    networking: [
      "-- Select Product --",
      "CCTV Cable",
      "LAN Cable",
      "PV Solar Cable",
      "Uni-tube Un-armoured Optical Fiber Cable"
    ]
  };

  const productTypeSelect = document.getElementById('productType');
  const subProductGroup = document.getElementById('subProductGroup');
  const subProductSelect = document.getElementById('subProduct');
  const otherCommentGroup = document.getElementById('otherCommentGroup');

  productTypeSelect.addEventListener('change', function() {
    const selectedProduct = this.value;

    if (selectedProduct === 'others') {
      subProductGroup.style.display = 'none';
      subProductSelect.innerHTML = '';
      otherCommentGroup.style.display = 'flex';
    } else if (selectedProduct && subProductsData[selectedProduct]) {
      subProductGroup.style.display = 'flex';
      subProductSelect.innerHTML = subProductsData[selectedProduct]
        .map(sub => `<option value="${sub}">${sub}</option>`)
        .join('');
      otherCommentGroup.style.display = 'none';
    } else {
      subProductGroup.style.display = 'none';
      subProductSelect.innerHTML = '';
      otherCommentGroup.style.display = 'none';
    }
  });

  document.getElementById('enquiryForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Gather form data in the required format
    const fullName = document.querySelector('input[name="fullName"]').value.trim();
    const companyName = document.querySelector('input[name="companyName"]').value.trim();
    const emailAddress = document.querySelector('input[name="email"]').value.trim();
    const phoneNumber = document.querySelector('input[name="phone"]').value.trim();
    const address = document.querySelector('input[name="address"]').value.trim();
    const productType = document.getElementById('productType') ? document.getElementById('productType').value : '';
    let productName = '';
    if (document.getElementById('subProductGroup').style.display !== 'none') {
      productName = document.getElementById('subProduct').value;
    } else if (document.getElementById('otherCommentGroup').style.display !== 'none') {
      productName = document.getElementById('otherComment').value.trim();
    }
    const enquiryMessage = document.querySelector('textarea[name="message"]').value.trim();
    // POST to API
    try {
      const res = await fetch(`${API_BASE_URL}/api/enquiry`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          fullName,
          companyName,
          emailAddress,
          phoneNumber,
          address,
          productType,
          productName,
          enquiryMessage
        })
      });
      if (res.ok) {
        alert('✅ Thank you!\nWe’ve received your inquiry about Anocab Wires and Cables.\nOur team will get back to you shortly. 📩🙂');
        e.target.reset();
      } else {
        alert('Submission failed. Please try again.');
      }
    } catch (err) {
      alert('Error submitting form. Please try again.');
    }
  });
</script>
</body>
</html>
