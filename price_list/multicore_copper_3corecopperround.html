<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ANOCAB Cable MRP Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #444;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
    }
    input[type="number"] {
      width: 80px;
      padding: 4px;
    }
    .center-btn {
      text-align: center;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>ANOCAB MULTISTRAND CABLE MRP CALCULATOR</h2>

<table>
  <thead>
    <tr>
      <th>Size (SQMM)</th>
      <th>Total WT of Conductor (KG/KM)</th>
      <th>Total WT of Insulation (KG/KM)</th>
      <th>WT of Outer Sheath (KG/KM)</th>
      <th>Rate of PVC ST 1 + PVC ST 2</th>
      <th>Rate of Copper</th>
      <th>Raw Cost (Rs/KM)</th>
      <th>Processing Charge</th>
      <th>Length</th>
      <th>Basic Price of Coil</th>
      <th>Super Stockist</th>
      <th>Distributor</th>
      <th>Dealer</th>
      <th>MRP</th>
    </tr>
  </thead>
  <tbody id="cableData"></tbody>
</table>

<div class="center-btn">
  <button onclick="calculate()">Calculate</button>
</div>

<script src="/config.js"></script>
<script>
  
  let pvcRateDefault = 92.63;
  let copperRateDefault = 912.02;

  const cableSpecs = [
    { size: 0.5, conductor: 13.335, insulation: 13.336, sheath: 33.5328 },
    { size: 0.75, conductor: 20.003, insulation: 15.294, sheath: 37.5824 },
    { size: 1.0, conductor: 26.67, insulation: 17.533, sheath: 42.4435 },
    { size: 1.5, conductor: 40.005, insulation: 20.237, sheath: 48.6489 },
    { size: 2.5, conductor: 66.675, insulation: 29.376, sheath: 68.1694 },
    { size: 4.0, conductor: 106.680, insulation: 40.412, sheath: 91.5110 },
    { size: 6.0, conductor: 160.020, insulation: 47.251, sheath: 108.5452 },
    { size: 10.0, conductor: 266.700, insulation: 62.172, sheath: 128.5406 }
  ];

  async function fetchApprovedRates() {
    try {
      // To handle pagination and get all products, modify the API call
      // First try with limit=100 to get all products at once
      const res = await fetch(`${API_BASE_URL}/api/prices/approved?limit=100`);
      const data = await res.json();
      let allRates = data.data || [];
      
      // If there are more pages, fetch them (this is a fallback if limit doesn't work)
      if (data.totalPages > 1 && data.currentPage === 1) {
        console.log(`Detected pagination: ${data.totalPages} pages total. Fetching all...`);
        const additionalRequests = [];
        for (let page = 2; page <= data.totalPages; page++) {
          additionalRequests.push(
            fetch(`${API_BASE_URL}/api/prices/approved?page=${page}`)
              .then(res => res.json())
              .then(pageData => pageData.data || [])
          );
        }
        const additionalResults = await Promise.all(additionalRequests);
        // Combine all results
        additionalResults.forEach(pageRates => {
          allRates = [...allRates, ...pageRates];
        });
      }
      
      // Debug: Log all available items to see what's actually coming from the server
      console.log('Available items from API after fetching all pages:', allRates.map(r => r.item));
      console.log('Total items fetched:', allRates.length);
      
      // First try to find PVC ST1 + PVC ST2 directly
      let pvcObj = allRates.find(r => {
        if (!r.item) return false;
        return r.item.toUpperCase().trim() === 'PVC ST1 + PVC ST2';
      });
      
      // If not found, try to get the average of PVC ST1 and PVC ST2 separately
      if (!pvcObj) {
        const st1Obj = allRates.find(r => r.item && (r.item.toUpperCase().includes('PVC ST1/TYPE A') || r.item.toUpperCase() === 'PVC ST1'));
        const st2Obj = allRates.find(r => r.item && r.item.toUpperCase() === 'PVC ST2');
        
        if (st1Obj?.mrp && st2Obj?.mrp) {
          console.log('Found separate PVC ST1 rate:', st1Obj.mrp, 'and PVC ST2 rate:', st2Obj.mrp);
          // Create a combined rate as the average
          const st1Rate = parseFloat(st1Obj.mrp);
          const st2Rate = parseFloat(st2Obj.mrp);
          const avgRate = (st1Rate + st2Rate) / 2;
          pvcRateDefault = avgRate;
          console.log('Calculated average rate:', avgRate);
          return; // Exit early since we've already set the rate
        }
      }
      
      const copperObj = allRates.find(r => r.item?.toUpperCase().includes('COPPER LME GRADE'));
      
      if (pvcObj?.mrp) {
        console.log('Found PVC ST1 + PVC ST2 rate:', pvcObj.mrp);
        pvcRateDefault = parseFloat(pvcObj.mrp);
      } else {
        console.warn('PVC ST1 + PVC ST2 rate not found, using default:', pvcRateDefault);
      }
      
      copperRateDefault = copperObj?.mrp ? parseFloat(copperObj.mrp) : copperRateDefault;
    } catch (err) {
      console.error("Rate fetch failed:", err);
    }
  }

  function renderTable() {
    const tbody = document.getElementById("cableData");
    tbody.innerHTML = '';
    cableSpecs.forEach((item, index) => {
      const row = `
        <tr>
          <td>${item.size}</td>
          <td>${item.conductor.toFixed(2)}</td>
          <td>${item.insulation.toFixed(2)}</td>
          <td>${item.sheath.toFixed(2)}</td>
          <td><input type="number" class="pvcRate" id="pvc-${index}" value="${pvcRateDefault}"></td>
          <td><input type="number" class="copperRate" id="copper-${index}" value="${copperRateDefault}"></td>
          <td id="raw-${index}">-</td>
          <td id="processing-${index}">-</td>
          <td>1 MTR</td>
          <td id="basic-${index}">-</td>
          <td id="super-${index}">-</td>
          <td id="distributor-${index}">-</td>
          <td id="dealer-${index}">-</td>
          <td id="mrp-${index}">-</td>
        </tr>
      `;
      tbody.insertAdjacentHTML("beforeend", row);
    });
  }

  async function initialize() {
    await fetchApprovedRates();
    renderTable();
  }

  function calculate() {
    const tbody = document.getElementById("cableData");
    cableSpecs.forEach((item, index) => {
      const pvcRate = parseFloat(document.getElementById(`pvc-${index}`).value);
      const copperRate = parseFloat(document.getElementById(`copper-${index}`).value);
      const rawCost = ((item.insulation + item.sheath) * pvcRate) + (item.conductor * copperRate);
      const processingCharge = (rawCost / 86.5) * 100;
      const basicPrice = processingCharge / 1000;
      const superStockist = basicPrice * 1.02;
      const distributor = superStockist * 1.03;
      const dealer = distributor * 1.065;
      const mrp = (dealer / 55) * 100;

      document.getElementById(`raw-${index}`).innerText = rawCost.toFixed(0);
      document.getElementById(`processing-${index}`).innerText = processingCharge.toFixed(0);
      document.getElementById(`basic-${index}`).innerText = basicPrice.toFixed(0);
      document.getElementById(`super-${index}`).innerText = superStockist.toFixed(0);
      document.getElementById(`distributor-${index}`).innerText = distributor.toFixed(0);
      document.getElementById(`dealer-${index}`).innerText = dealer.toFixed(0);
      document.getElementById(`mrp-${index}`).innerText = mrp.toFixed(0);
    });

    const rates = cableSpecs.map((item, index) => ({
      size: item.size,
      rate: document.getElementById(`mrp-${index}`).innerText
    }));
    localStorage.setItem('mcc_copper_3corecopperround_rates', JSON.stringify(rates));
  }

  window.onload = async function() {
    await initialize();
    calculate();
  };
</script>

</body>
</html>
