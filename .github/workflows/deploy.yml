name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to VPS
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        MAIL_USER: ${{ secrets.MAIL_USER }}
        MAIL_PASS: ${{ secrets.MAIL_PASS }}
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      run: |
        sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no root@$SERVER_IP "
          set -e
          
          if [ ! -d '/var/www/anocab' ]; then
            mkdir -p /var/www/anocab
            cd /var/www/anocab
            git clone https://github.com/ashishu703/Anocab_website.git .
            cd backend && npm install --production && cd ..
            cd admin_panel && npm install --production && cd ..
            cd apply_now && npm install --production && cd ..
            if [ ! -f '/etc/nginx/sites-available/anocab-website' ]; then
              cp /var/www/anocab/nginx.conf /etc/nginx/sites-available/anocab-website
              ln -sf /etc/nginx/sites-available/anocab-website /etc/nginx/sites-enabled/
              systemctl restart nginx
            fi
            mkdir -p /var/log/pm2
          else
            cd /var/www/anocab
            git stash
            git pull origin main
            cd backend && npm install --production && cd ..
            cd admin_panel && npm install --production && cd ..
            cd apply_now && npm install --production && cd ..
          fi
          
          echo "PORT=1111" > /var/www/anocab/backend/.env
          echo "NODE_ENV=production" >> /var/www/anocab/backend/.env
          echo "API_BASE_URL=https://anocab.com" >> /var/www/anocab/backend/.env
          echo "CORS_ORIGIN=*" >> /var/www/anocab/backend/.env
          echo "ADMIN_EMAIL=${ADMIN_EMAIL}" >> /var/www/anocab/backend/.env
          echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}" >> /var/www/anocab/backend/.env
          echo "SESSION_SECRET=${SESSION_SECRET}" >> /var/www/anocab/backend/.env
          echo "MONGODB_URI=${MONGODB_URI}" >> /var/www/anocab/backend/.env
          echo "MAIL_USER=${MAIL_USER}" >> /var/www/anocab/backend/.env
          echo "MAIL_PASS=${MAIL_PASS}" >> /var/www/anocab/backend/.env
          echo "MAIL_HOST=smtp.gmail.com" >> /var/www/anocab/backend/.env
          echo "MAIL_PORT=587" >> /var/www/anocab/backend/.env
          echo "NOTIFICATION_EMAIL=admin@anocab.in" >> /var/www/anocab/backend/.env
          
          echo "PORT=1112" > /var/www/anocab/admin_panel/.env
          echo "NODE_ENV=production" >> /var/www/anocab/admin_panel/.env
          echo "APP_URL=https://anocab.com" >> /var/www/anocab/admin_panel/.env
          echo "ADMIN_EMAIL=${ADMIN_EMAIL}" >> /var/www/anocab/admin_panel/.env
          echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}" >> /var/www/anocab/admin_panel/.env
          echo "SESSION_SECRET=${SESSION_SECRET}" >> /var/www/anocab/admin_panel/.env
          
          echo "PORT=1113" > /var/www/anocab/apply_now/.env
          echo "NODE_ENV=production" >> /var/www/anocab/apply_now/.env
          echo "MONGODB_URI=${MONGODB_URI}" >> /var/www/anocab/apply_now/.env
          echo "MAIL_USER=${MAIL_USER}" >> /var/www/anocab/apply_now/.env
          echo "MAIL_PASS=${MAIL_PASS}" >> /var/www/anocab/apply_now/.env
          echo "MAIL_HOST=smtp.gmail.com" >> /var/www/anocab/apply_now/.env
          echo "MAIL_PORT=587" >> /var/www/anocab/apply_now/.env
          echo "ADMIN_EMAIL=${ADMIN_EMAIL}" >> /var/www/anocab/apply_now/.env
          
          chmod 600 /var/www/anocab/backend/.env
          chmod 600 /var/www/anocab/admin_panel/.env
          chmod 600 /var/www/anocab/apply_now/.env
          
          cd /var/www/anocab
          
          # Force update nginx configuration
          echo '🔧 Updating Nginx configuration...'
          sudo cp -f /var/www/anocab/nginx.conf /etc/nginx/sites-available/anocab-website
          
          # Test nginx config
          if sudo nginx -t; then
            echo '✅ Nginx config test passed'
            sudo systemctl reload nginx
            echo '✅ Nginx reloaded successfully'
          else
            echo '❌ Nginx config test failed'
            exit 1
          fi
          
          # Restart PM2 services
          echo '🔄 Restarting PM2 services...'
          if pm2 list | grep -q 'anocab-website-backend'; then
            pm2 delete all
            pm2 start ecosystem.config.js
            pm2 save
          else
            pm2 start ecosystem.config.js
            pm2 save
          fi
          
          # Force reload to pick up new environment variables
          pm2 reload all --update-env
          
          echo '✅ Deployment completed successfully'
        "

    - name: Health Check
      run: |
        sleep 15
        curl -f http://${{ secrets.SERVER_IP }}/api/prices || echo "Services starting"
