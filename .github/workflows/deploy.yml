name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to VPS
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      run: |
        sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no root@$SERVER_IP << 'ENDSSH'
          set -e
          
          cd /var/www/anocab
          git pull origin main
          
          cd backend && npm ci --production && cd ..
          cd admin_panel && npm ci --production && cd ..
          cd apply_now && npm ci --production && cd ..
          
          pm2 reload ecosystem.config.js --update-env
          pm2 save
          pm2 status
        ENDSSH

    - name: Health Check
      run: |
        sleep 15
        curl -f http://${{ secrets.SERVER_IP }}/api/prices || echo "Services starting..."


