name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to VPS
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      run: |
        sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no root@$SERVER_IP << 'ENDSSH'
          set -e
          
          # Check if directory exists, if not run initial setup
          if [ ! -d "/var/www/anocab" ]; then
            echo "First time setup - creating directory and cloning repo"
            mkdir -p /var/www/anocab
            cd /var/www/anocab
            git clone https://github.com/ashishu703/Anocab_website.git .
            
            # Install dependencies
            cd backend && npm ci --production && cd ..
            cd admin_panel && npm ci --production && cd ..
            cd apply_now && npm ci --production && cd ..
            
            # Create .env files
            cat > /var/www/anocab/backend/.env << EOF
PORT=1111
NODE_ENV=production
API_BASE_URL=http://\$SERVER_IP
CORS_ORIGIN=*
ADMIN_EMAIL=admin@anocab.com
ADMIN_PASSWORD=yourSecurePassword123
SESSION_SECRET=your-super-secret-session-key-change-this-in-production
MONGODB_URI=mongodb+srv://ashishu703_db_user:Ashish7870@cluster0.rlc2rg5.mongodb.net/monzo?authSource=admin&retryWrites=true&w=majority
MAIL_USER=admin@anocab.in
MAIL_PASS=xfss vdao mlrq fynn
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
NOTIFICATION_EMAIL=admin@anocab.in
EOF

            cat > /var/www/anocab/admin_panel/.env << EOF
PORT=1112
NODE_ENV=production
ADMIN_EMAIL=admin@anocab.com
ADMIN_PASSWORD=yourSecurePassword123
SESSION_SECRET=your-super-secret-session-key-change-this-in-production
EOF

            cat > /var/www/anocab/apply_now/.env << EOF
PORT=1113
NODE_ENV=production
MONGODB_URI=mongodb+srv://ashishu703_db_user:Ashish7870@cluster0.rlc2rg5.mongodb.net/monzo?authSource=admin&retryWrites=true&w=majority
MAIL_USER=admin@anocab.in
MAIL_PASS=xfss vdao mlrq fynn
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
ADMIN_EMAIL=admin@anocab.in
EOF

            chmod 600 /var/www/anocab/*/.env
            
            # Setup NGINX if not exists
            if [ ! -f "/etc/nginx/sites-available/anocab" ]; then
              cp /var/www/anocab/nginx.conf /etc/nginx/sites-available/anocab
              ln -sf /etc/nginx/sites-available/anocab /etc/nginx/sites-enabled/
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl restart nginx
            fi
            
            # Start PM2
            mkdir -p /var/log/pm2
            cd /var/www/anocab
            pm2 start ecosystem.config.js
            pm2 save
          else
            # Normal deployment
            cd /var/www/anocab
            git pull origin main
            
            cd backend && npm ci --production && cd ..
            cd admin_panel && npm ci --production && cd ..
            cd apply_now && npm ci --production && cd ..
            
            pm2 reload ecosystem.config.js --update-env
            pm2 save
          fi
          
          pm2 status
        ENDSSH

    - name: Health Check
      run: |
        sleep 15
        curl -f http://${{ secrets.SERVER_IP }}/api/prices || echo "Services starting..."


