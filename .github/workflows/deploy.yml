name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to VPS
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
        SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        MAIL_USER: ${{ secrets.MAIL_USER }}
        MAIL_PASS: ${{ secrets.MAIL_PASS }}
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      run: |
        sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no root@$SERVER_IP << 'ENDSSH'
          set -e
          
          if [ ! -d "/var/www/anocab" ]; then
            mkdir -p /var/www/anocab
            cd /var/www/anocab
            git clone https://github.com/ashishu703/Anocab_website.git .
            
            cd backend && npm ci --production && cd ..
            cd admin_panel && npm ci --production && cd ..
            cd apply_now && npm ci --production && cd ..
            
            cat > /var/www/anocab/backend/.env << 'ENVEOF'
PORT=1111
NODE_ENV=production
API_BASE_URL=http://SERVER_IP_PLACEHOLDER
CORS_ORIGIN=*
ADMIN_EMAIL=ADMIN_EMAIL_PLACEHOLDER
ADMIN_PASSWORD=ADMIN_PASSWORD_PLACEHOLDER
SESSION_SECRET=SESSION_SECRET_PLACEHOLDER
MONGODB_URI=MONGODB_URI_PLACEHOLDER
MAIL_USER=MAIL_USER_PLACEHOLDER
MAIL_PASS=MAIL_PASS_PLACEHOLDER
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
NOTIFICATION_EMAIL=ADMIN_EMAIL_PLACEHOLDER
ENVEOF

            cat > /var/www/anocab/admin_panel/.env << 'ENVEOF'
PORT=1112
NODE_ENV=production
ADMIN_EMAIL=ADMIN_EMAIL_PLACEHOLDER
ADMIN_PASSWORD=ADMIN_PASSWORD_PLACEHOLDER
SESSION_SECRET=SESSION_SECRET_PLACEHOLDER
ENVEOF

            cat > /var/www/anocab/apply_now/.env << 'ENVEOF'
PORT=1113
NODE_ENV=production
MONGODB_URI=MONGODB_URI_PLACEHOLDER
MAIL_USER=MAIL_USER_PLACEHOLDER
MAIL_PASS=MAIL_PASS_PLACEHOLDER
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
ADMIN_EMAIL=ADMIN_EMAIL_PLACEHOLDER
ENVEOF

            chmod 600 /var/www/anocab/*/.env
            
            if [ ! -f "/etc/nginx/sites-available/anocab" ]; then
              cp /var/www/anocab/nginx.conf /etc/nginx/sites-available/anocab
              ln -sf /etc/nginx/sites-available/anocab /etc/nginx/sites-enabled/
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl restart nginx
            fi
            
            mkdir -p /var/log/pm2
            cd /var/www/anocab
            pm2 start ecosystem.config.js
            pm2 save
          else
            cd /var/www/anocab
            git pull origin main
            
            cd backend && npm ci --production && cd ..
            cd admin_panel && npm ci --production && cd ..
            cd apply_now && npm ci --production && cd ..
            
            pm2 reload ecosystem.config.js --update-env
            pm2 save
          fi
          
          pm2 status
        ENDSSH
        
        # Replace placeholders with actual secrets
        sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no root@$SERVER_IP << ENDSSH
          sed -i "s|SERVER_IP_PLACEHOLDER|$SERVER_IP|g" /var/www/anocab/backend/.env
          sed -i "s|MONGODB_URI_PLACEHOLDER|$MONGODB_URI|g" /var/www/anocab/backend/.env
          sed -i "s|MONGODB_URI_PLACEHOLDER|$MONGODB_URI|g" /var/www/anocab/apply_now/.env
          sed -i "s|MAIL_USER_PLACEHOLDER|$MAIL_USER|g" /var/www/anocab/backend/.env
          sed -i "s|MAIL_USER_PLACEHOLDER|$MAIL_USER|g" /var/www/anocab/apply_now/.env
          sed -i "s|MAIL_PASS_PLACEHOLDER|$MAIL_PASS|g" /var/www/anocab/backend/.env
          sed -i "s|MAIL_PASS_PLACEHOLDER|$MAIL_PASS|g" /var/www/anocab/apply_now/.env
          sed -i "s|ADMIN_EMAIL_PLACEHOLDER|$ADMIN_EMAIL|g" /var/www/anocab/backend/.env
          sed -i "s|ADMIN_EMAIL_PLACEHOLDER|$ADMIN_EMAIL|g" /var/www/anocab/admin_panel/.env
          sed -i "s|ADMIN_EMAIL_PLACEHOLDER|$ADMIN_EMAIL|g" /var/www/anocab/apply_now/.env
          sed -i "s|ADMIN_PASSWORD_PLACEHOLDER|$ADMIN_PASSWORD|g" /var/www/anocab/backend/.env
          sed -i "s|ADMIN_PASSWORD_PLACEHOLDER|$ADMIN_PASSWORD|g" /var/www/anocab/admin_panel/.env
          sed -i "s|SESSION_SECRET_PLACEHOLDER|$SESSION_SECRET|g" /var/www/anocab/backend/.env
          sed -i "s|SESSION_SECRET_PLACEHOLDER|$SESSION_SECRET|g" /var/www/anocab/admin_panel/.env
          
          pm2 restart all
        ENDSSH

    - name: Health Check
      run: |
        sleep 15
        curl -f http://${{ secrets.SERVER_IP }}/api/prices || echo "Services starting..."


