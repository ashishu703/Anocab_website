# 1. HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name anocab.com www.anocab.com;
    return 301 https://$host$request_uri;
}

# 2. Main HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name anocab.com www.anocab.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/anocab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anocab.com/privkey.pem;
    
    # Is file ke andar dhparam pehle se hai, isliye alag se nahi likhna
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/anocab;
    index index.html;

    # Frontend - Static HTML files
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # API - Main Backend (Port 1111)
    location /api/ {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Admin Panel (Port 1112)
    location /admin_panel/ {
        alias /var/www/anocab/admin_panel/;
        try_files $uri $uri/ =404;
    }

    location /login { proxy_pass http://localhost:1112; }
    location /logout { proxy_pass http://localhost:1112; }
    location /check-auth { proxy_pass http://localhost:1112; }
    location /update-prices { proxy_pass http://localhost:1112; }

    # Career/Apply Now (Port 1113)
    location /submit-form { proxy_pass http://localhost:1113; }
    location /fetch-forms { proxy_pass http://localhost:1113; }
    location /download-resume/ { proxy_pass http://localhost:1113; }

    # Max upload size
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/anocab-access.log;
    error_log /var/log/nginx/anocab-error.log;
}