# 1. HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name anocab.com www.anocab.com;
    return 301 https://$host$request_uri;
}

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# 2. Main HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name anocab.com www.anocab.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/anocab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anocab.com/privkey.pem;
    
    # Is file ke andar dhparam pehle se hai, isliye alag se nahi likhna
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/anocab;
    index index.html;

    # Gzip compression for performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # API - Main Backend (Port 1111) - MUST come before / location
    location /api/ {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        
        # Don't modify cookies - let Express handle it
        proxy_cookie_flags ~ nosecure samesite=none;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for long requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Auth endpoints - Backend (Port 1111)
    location /login {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_flags ~ nosecure samesite=none;
    }
    
    location /logout {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_flags ~ nosecure samesite=none;
    }
    
    location /check-auth {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_flags ~ nosecure samesite=none;
    }

    # Admin Panel endpoints (Port 1112)
    location /admin_panel/ {
        alias /var/www/anocab/admin_panel/;
        try_files $uri $uri/ =404;
    }

    # Update prices - Main Backend (Port 1111) with auth
    location /update-prices {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_flags ~ nosecure samesite=none;
    }

    # Career/Apply Now - Main Backend (Port 1111) with auth
    location /submit-form {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_flags ~ nosecure samesite=none;
    }
    
    location /fetch-forms {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_flags ~ nosecure samesite=none;
    }
    
    location /download-resume/ {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_flags ~ nosecure samesite=none;
    }

    # Frontend - Static HTML files (MUST be last)
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Max upload size
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/anocab-access.log;
    error_log /var/log/nginx/anocab-error.log;
}