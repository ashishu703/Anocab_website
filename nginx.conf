# 1. HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name anocab.com www.anocab.com;
    return 301 https://$host$request_uri;
}

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# 2. Main HTTPS Server - UNIFIED BACKEND (Port 1111 only)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name anocab.com www.anocab.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/anocab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anocab.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/anocab;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Disable caching for API and auth endpoints
    add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    # ALL Backend API Routes - Port 1111 (Unified Backend)
    location ~ ^/(api|login|logout|check-auth|test-jwt|update-prices|submit-form|fetch-forms|download-resume)/ {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Disable caching
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Exact match for auth endpoints (no trailing slash)
    location = /login {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
    }
    
    location = /logout {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location = /check-auth {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
    
    location = /test-jwt {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location = /update-prices {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
    
    location = /submit-form {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location = /fetch-forms {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Static files - Admin Panel HTML
    location /admin_panel/ {
        alias /var/www/anocab/admin_panel/;
        try_files $uri $uri/ =404;
    }
    
    # Static files - Login Panel HTML
    location /login_panel/ {
        alias /var/www/anocab/login_panel/;
        try_files $uri $uri/ =404;
    }
    
    # Static files - Apply Now HTML
    location /apply_now/ {
        alias /var/www/anocab/apply_now/;
        try_files $uri $uri/ =404;
    }

    # Frontend - Static HTML files (MUST be last)
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Max upload size
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/anocab-access.log;
    error_log /var/log/nginx/anocab-error.log;
}