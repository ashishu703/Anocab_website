server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory for static files
    root /var/www/anocab;
    index index.html;

    # Max upload size (for resume uploads)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API routes - Main Backend (Port 1111)
    location /api/ {
        proxy_pass http://localhost:1111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Config.js - Dynamic API configuration
    location = /config.js {
        proxy_pass http://localhost:1111/config.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Admin Panel routes (Port 3002)
    location /admin_panel/ {
        alias /var/www/anocab/admin_panel/;
        try_files $uri $uri/ =404;
    }

    location /login {
        proxy_pass http://localhost:1112;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /logout {
        proxy_pass http://localhost:1112;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /check-auth {
        proxy_pass http://localhost:1112;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /update-prices {
        proxy_pass http://localhost:1112;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Career/Apply Now routes (Port 1113)
    location /submit-form {
        proxy_pass http://localhost:1113;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    location /fetch-forms {
        proxy_pass http://localhost:1113;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /download-resume/ {
        proxy_pass http://localhost:1113;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static HTML files
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/anocab;
    }

    # Logs
    access_log /var/log/nginx/anocab-website-access.log;
    error_log /var/log/nginx/anocab-website-error.log;
}
